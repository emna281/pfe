<div class="flex justify-between items-center mb-4">
  <div>
    <h1 class="text-xl font-semibold text-gray-800 dark:text-white">Compétences</h1>
    <p class="text-sm text-gray-400">Gérez vos compétences</p>
  </div>
  <button (click)="openFormulaire()"
    class="flex items-center gap-2 rounded-lg bg-brand-500 px-4 py-2 text-sm font-medium text-white shadow-md transition-all duration-200 hover:bg-brand-600 hover:shadow-lg active:scale-95">
    + Ajouter une compétence </button>
</div>
<app-formulaire-competence
  *ngIf="isFormulaireOpen"
  [selectedCompetence]=null
  [isOpen]="isFormulaireOpen"
  (closeFormulaire)="fermerFormulaire()"
></app-formulaire-competence>
<app-table-competence></app-table-competence>
