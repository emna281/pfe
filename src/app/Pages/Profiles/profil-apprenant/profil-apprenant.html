<div class="min-h-screen bg-gray-50 dark:bg-gray-900">
  <ng-container *ngIf="profil as p">

    <!-- HEADER PROFIL -->
    <div class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-6 py-6">
      <div class="w-full px-8 mt-6">

        <!-- Identité + progression -->
        <div class="flex items-center justify-between mb-6">
          <div class="flex items-center gap-4">

            <!-- Avatar -->
            <div class="w-16 h-16 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xl font-bold">
              {{ getInitiales() }}
            </div>

            <!-- Nom + numéro -->
            <div>
              <h1 class="text-2xl font-bold text-gray-900 dark:text-white">
                {{ p.prenom }} {{ p.nom }}
              </h1>
              <p class="text-base text-gray-500 dark:text-gray-400">
                Numéro d'inscription : APP-{{ p.numeroEnregistrement }}
              </p>
              <div class="flex items-center gap-2 mt-1">
                <span class="text-sm px-2 py-0.5 rounded-full bg-blue-100 text-blue-600 font-medium">
                  {{ p.niveauEtude || 'Non renseigné' }}
                </span>
                <span class="text-sm text-gray-400">{{ p.posteActuel || 'Poste non renseigné' }}</span>
              </div>
            </div>

          </div>



        </div>

        <!-- TABS -->
        <div class="flex gap-1 overflow-x-auto">
          <button
            *ngFor="let tab of tabs"
            (click)="setTab(tab.id)"
            [ngClass]="{
              'border-b-2 border-blue-500 text-blue-600 font-semibold': activeTab === tab.id,
              'text-gray-500 hover:text-gray-700': activeTab !== tab.id
            }"
            class="px-4 py-2 text-base whitespace-nowrap transition-colors">
            {{ tab.label }}
          </button>
        </div>

      </div>
    </div>

    <!-- CONTENU TABS -->
    <div class="w-full px-8 mt-6">

      <!-- Mon planning -->
      <app-planing
        *ngIf="activeTab === 'planning' && profil"
        >
      </app-planing>

      

      <!-- Historique -->
      <app-historique *ngIf="activeTab === 'historique'"></app-historique>

      <!-- Paiements -->
      <app-paiement *ngIf="activeTab === 'paiements'"></app-paiement>

      <!-- Certificats -->
      <div *ngIf="activeTab === 'certificats'">
        <p class="text-gray-500">Certificats à venir...</p>
      </div>

      <!-- Paramètres -->
      <div *ngIf="activeTab === 'parametres'">
        <p class="text-gray-500">Paramètres à venir...</p>
      </div>

    </div>

  </ng-container>

  <!-- Chargement -->
  <div *ngIf="!profil" class="flex items-center justify-center h-64">
    <p class="text-gray-400">Chargement du profil...</p>
  </div>

</div>
