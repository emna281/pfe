<div class="min-h-screen bg-gray-50 dark:bg-gray-900">
  <ng-container *ngIf="profil() as p">

    <!-- HEADER PROFIL -->
    <div class="bg-gray-50 dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 px-8 py-6">
      <div class="max-w-7xl mx-auto">

        <!-- Badge + titre -->
        <div class="mb-4">
          <div class="gap-5">
            <span class="inline-block bg-green-100 text-green-600 text-xs font-semibold px-3 py-1 rounded-full">
              {{ p.niveauEtude || 'Non renseigné' }}
            </span>
            <span class="inline-block bg-gray-100 text-gray-500 text-xs font-semibold px-3 py-1 rounded-full">
              {{ p.posteActuel || 'Poste non renseigné' }}
            </span>
          </div>
          <h1 class="text-3xl font-bold text-gray-900 dark:text-white mt-2">
            Bonjour, {{ p.prenom }}
          </h1>
          <p class="text-gray-500 dark:text-gray-400 mt-1">
            Voici votre progression pour la session de {{ anneeCourante }}.
          </p>
        </div>

        <!-- Tabs -->
        <div class="flex gap-6 border-b border-gray-200 dark:border-gray-700 mt-4">
          <button
            *ngFor="let tab of tabs"
            (click)="setTab(tab.id)"
            [ngClass]="{
              'border-b-2 border-blue-600 text-blue-600 font-semibold': activeTab() === tab.id,
              'text-gray-500 hover:text-blue-900': activeTab() !== tab.id
            }"
            class="pb-2 text-sm transition-colors">
            {{ tab.label }}
          </button>
        </div>

      </div>
    </div>

    <!-- CONTENU TABS -->
    <div class="max-w-7xl mx-auto">

      <app-planing *ngIf="activeTab() === 'planning'"></app-planing>

      <app-historique *ngIf="activeTab() === 'historique'"></app-historique>

      <app-paiement *ngIf="activeTab() === 'paiements'"></app-paiement>

      <div *ngIf="activeTab() === 'certificats'">
        <app-apprenant-certificats />
      </div>

      <div *ngIf="activeTab() === 'parametres'">
        <app-apprenant-parametres
          *ngIf="profil()"
          [user]="profil()!">
        </app-apprenant-parametres>
      </div>

    </div>

  </ng-container>

  <!-- Chargement -->
  <div *ngIf="!profil()" class="flex items-center justify-center h-64">
    <p class="text-gray-400">Chargement du profil...</p>
  </div>

</div>
