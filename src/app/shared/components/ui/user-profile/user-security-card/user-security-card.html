<div class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm dark:border-gray-800 dark:bg-white/[0.03]">

  <!-- HEADER -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <div class="flex items-center gap-3">
        <div class="flex items-center justify-center w-10 h-10 rounded-full bg-green-100">
          <lucide-icon name="shield-check" class="w-5 h-5 text-green-700"></lucide-icon>
        </div>
        <h4 class="text-xl font-semibold text-gray-800 dark:text-white">
        Sécurité du compte
        </h4>
      </div>
      <p class="text-sm text-gray-500 ml-12">
        Gérez votre mot de passe
      </p>
    </div>

    <button
    *ngIf="!isAdminView && peutChangerMdp"
  
      (click)="ouvrirModalMdp()"
      class="flex items-center gap-2 rounded-xl bg-white px-4 py-2 border border-green-700 text-sm font-medium text-green-700 hover:bg-green-50"
    >
    <lucide-icon name="LockKeyhole" class="w-4 h-4 text-green-700"></lucide-icon>
    Changer le mot de passe
    </button>
  </div>

  <!-- ALERT GLOBAL -->
  <app-alert
    *ngIf="successMdp"
    variant="success"
    title="Succès"
    [message]="successMdp">
  </app-alert>

  <app-alert
    *ngIf="erreurMdp"
    variant="error"
    title="Erreur"
    [message]="erreurMdp">
  </app-alert>
 
 <!-- Modal de mot de passe -->
  <app-modal [isOpen]="isModalMdpOpen" (close)="fermerModalMdp()" className="max-w-[500px] m-4">
  <div class="p-6">
    <h4 class="text-xl font-semibold text-gray-800 mb-1">Changer le mot de passe</h4>
    <p class="text-sm text-gray-500 mb-6">
      Entrez votre mot de passe temporaire reçu par email, puis choisissez un nouveau.
    </p>

    <div *ngIf="erreurMdp"
         class="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-600">
      {{ erreurMdp }}
    </div>

    <div *ngIf="successMdp"
         class="mb-4 px-4 py-3 bg-green-50 border border-green-200 rounded-lg text-sm text-green-600">
      {{ successMdp }}
    </div>

    <div class="flex flex-col gap-4">
      <div>
        <label class="mb-1.5 block text-sm font-medium text-gray-700">
          Mot de passe temporaire (actuel)
        </label>
        <input type="password" [(ngModel)]="ancienMdp"
          placeholder="Votre mot de passe reçu par email"
          class="h-9 w-full rounded-lg border border-gray-300 px-4 text-sm
                 focus:outline-none focus:ring-2 focus:ring-orange-300"/>
      </div>
      <div>
        <label class="mb-1.5 block text-sm font-medium text-gray-700">
          Nouveau mot de passe
        </label>
        <input type="password" [(ngModel)]="nouveauMdp"
          placeholder="Minimum 8 caractères"
          class="h-9 w-full rounded-lg border border-gray-300 px-4 text-sm
                 focus:outline-none focus:ring-2 focus:ring-orange-300"/>
      </div>
      <div>
        <label class="mb-1.5 block text-sm font-medium text-gray-700">
          Confirmer le nouveau mot de passe
        </label>
        <input type="password" [(ngModel)]="confirmerMdp"
          placeholder="Répéter le nouveau mot de passe"
          class="h-9 w-full rounded-lg border border-gray-300 px-4 text-sm
                 focus:outline-none focus:ring-2 focus:ring-orange-300"/>
      </div>
    </div>

    <div class="flex items-center gap-3 mt-6 justify-end">
      <button (click)="fermerModalMdp()"
        class="px-4 py-2 rounded-lg border border-gray-300 text-sm text-gray-700 hover:bg-gray-50">
        Annuler
      </button>
      <button (click)="soumettreChangementMdp()"
        class="px-4 py-2 rounded-lg bg-orange-500 text-white text-sm font-medium hover:bg-orange-600">
        Confirmer
      </button>
    </div>
  </div>
</app-modal>
