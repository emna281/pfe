
<div
  class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm dark:border-gray-800 dark:bg-white/[0.03]"
>
  <div
    class="flex flex-col gap-6 lg:flex-row lg:items-center lg:justify-between"
  >
    
    <!-- LEFT -->
    <div class="flex items-center gap-5">

      <!-- Avatar -->
      <div
        class="flex h-24 w-24 items-center justify-center rounded-full bg-blue-600 text-3xl font-bold text-white shadow-lg"
      >
        {{ initiales }}
      </div>

      <!-- User Info -->
      <div>

        <div class="flex items-center gap-3">
          <h2 class="text-2xl font-bold text-gray-800 dark:text-white">
            {{ nomComplet }}
          </h2>

          <span
            class="rounded-full bg-orange-100 px-3 py-1 text-xs font-semibold text-orange-600"
          >
            {{ user.role }}
          </span>
        </div>

        <p class="mt-1 text-gray-500 dark:text-gray-400">
          {{ sousTitre }}
        </p>

        <div class="mt-4 flex flex-col gap-2 sm:flex-row sm:items-center sm:gap-6">

          <!-- Email -->
          <div class="flex items-center gap-2 text-gray-600 dark:text-gray-300">
            <lucide-icon name="mail"></lucide-icon>

            <span>{{ user.email }}</span>
          </div>

          <!-- Phone -->
          <div class="flex items-center gap-2 text-gray-600 dark:text-gray-300">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.129a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.209-.502l4.493 1.498A1 1 0 0121 15.72V19a2 2 0 01-2 2h-1C9.163 21 3 14.837 3 7V5z"
              />
            </svg>

            <span>{{ user.telephone }}</span>
          </div>

        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="flex items-center gap-3">
      

      <!-- Edit Button -->
      

    </div>
  </div>
</div>

<!-- Modal -->
<app-modal
  [isOpen]="isOpen"
  (close)="closeModal()"
  className="max-w-[700px] m-4"
>
  <div class="no-scrollbar relative w-full max-w-[700px] overflow-y-auto rounded-3xl bg-white p-4 dark:bg-gray-900 lg:p-11">
    <div class="px-2 pr-14">
      <h4 class="mb-2 text-2xl font-semibold text-gray-800 dark:text-white/90">
        Edit Personal Information
      </h4>
      <p class="mb-6 text-sm text-gray-500 dark:text-gray-400 lg:mb-7">
        Update your details to keep your profile up-to-date.
      </p>
    </div>
    <form class="flex flex-col" (ngSubmit)="handleSave()">
      <div class="custom-scrollbar h-[450px] overflow-y-auto px-2 pb-3">
        
        <div class="mt-7">
          <h5 class="mb-5 text-lg font-medium text-gray-800 dark:text-white/90 lg:mb-6">
            Personal Information
          </h5>
          <div class="grid grid-cols-1 gap-x-6 gap-y-5 lg:grid-cols-2">
            <div class="col-span-2 lg:col-span-1">
              <label>Prénom</label>
              <app-input-field type="text" [value]="user.prenom" />
            </div>
            <div class="col-span-2 lg:col-span-1">
              <label>Nom</label>
              <app-input-field type="text" [value]="user.nom  " />
            </div>
            <div class="col-span-2 lg:col-span-1">
              <label>Email </label>
              <app-input-field type="text" [value]="user.email" readOnly />
            </div>
            <div class="col-span-2 lg:col-span-1">
              <label>Téléphone</label>
              <app-input-field type="text" [value]="user.telephone ?? ''" />
            </div>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-3 px-2 mt-6 lg:justify-end">
        <app-boutton
          size="sm"
          variant="outline"
          (btnClick)="closeModal()"
        >
          Close
        </app-boutton>
        <app-boutton
          size="sm"
          (btnClick)="handleSave()"
        >
          Save Changes
        </app-boutton>
      </div>
    </form>
  </div>
</app-modal>
