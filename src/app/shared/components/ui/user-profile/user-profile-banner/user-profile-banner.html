<div class="rounded-xl p-5 flex items-center justify-between gap-4 mb-2"
  style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%)">

  <!-- Avatar + infos -->
  <div class="flex items-center gap-4">

    <!-- Avatar -->
    <div class="relative flex-shrink-0">
      <div class="w-14 h-14 rounded-full flex items-center justify-center
                  text-lg font-bold text-white"
        style="background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.2)">
        {{ getInitiales() }}
      </div>
      <!-- Icône caméra -->
      <div class="absolute -bottom-0.5 -right-0.5 w-5 h-5 rounded-full
                  flex items-center justify-center"
        style="background:#378ADD; border:2px solid #1a1a2e; cursor:pointer">
        <i class="ti ti-camera" style="font-size:10px; color:#fff"></i>
      </div>
    </div>

    <!-- Nom + poste + badges -->
    <div>
      <h2 class="text-white font-bold text-lg leading-tight">
        {{ user?.prenom }} {{ user?.nom }}
      </h2>
      <p class="text-sm mt-0.5" style="color:rgba(255,255,255,0.6)">
        <i class="ti ti-briefcase" style="font-size:12px; margin-right:4px"></i>
        {{ user?.posteActuel || 'Poste non renseigné' }}
        <span style="color:rgba(255,255,255,0.3)"> — </span>
        {{ user?.niveauEtude || 'Non renseigné' }}
      </p>

      <!-- Badges ID + date naissance -->
      <div class="flex items-center gap-2 mt-2">
        <span class="flex items-center gap-1 text-xs px-2 py-1 rounded-md font-medium"
          style="background:rgba(255,255,255,0.12); color:rgba(255,255,255,0.85)">
          <i class="ti ti-id-badge" style="font-size:11px"></i>
          ID: APP-{{ user?.numeroEnregistrement }}
        </span>
        <span *ngIf="user?.dateNaissance"
          class="flex items-center gap-1 text-xs px-2 py-1 rounded-md font-medium"
          style="background:rgba(255,255,255,0.12); color:rgba(255,255,255,0.85)">
          <i class="ti ti-calendar" style="font-size:11px"></i>
          {{ user?.dateNaissance | date:'dd MMMM yyyy' | uppercase }}
        </span>
      </div>
    </div>

  </div>

  <!-- Bouton Modifier -->
  <button
    class="flex items-center gap-2 text-sm px-4 py-2 rounded-lg font-medium flex-shrink-0 transition-colors"
    style="background:rgba(255,255,255,0.1);
           color:#fff;
           border:0.5px solid rgba(255,255,255,0.25)"
    onmouseenter="this.style.background='rgba(255,255,255,0.18)'"
    onmouseleave="this.style.background='rgba(255,255,255,0.1)'"
    (click)="onModifier()">
    <i class="ti ti-pencil" style="font-size:14px"></i>
    Modifier le profil
  </button>

</div>
