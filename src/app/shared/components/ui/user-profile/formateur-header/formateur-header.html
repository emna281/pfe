<div class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-6 py-6">
  <div class="w-full">

    <div class="flex items-center justify-between mb-6">

      <!-- LEFT : Avatar + Infos -->
      <div class="flex items-center gap-4">

        <!-- Avatar -->
        <div class="w-20 h-20 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xl font-bold">
          {{ getInitiales() }}
        </div>

        <!-- Infos utilisateur -->
        <div>

          <!-- Nom -->
          <h1 class="text-4xl font-bold text-gray-900 dark:text-white">
            {{ profil.prenom }} {{ profil.nom }}
          </h1>

          <!-- Spécialité -->
          <p class="text-base text-gray-500">
            {{ profil.specialite || '—' }}
          </p>

          <!-- Email -->
          <p class="text-base text-gray-400">
            {{ profil.email }}
          </p>

          <!-- STATS alignées avec email -->
          <div class="flex gap-6 mt-6 text-base">

            <!-- Sessions -->
            <div>
              <span class="font-bold text-blue-600">
                {{ nombreSessions }}
              </span>
              <span class="text-gray-400 ml-1">Sessions</span>
            </div>

            <!-- Heures enseignées -->
            <div>
              <span class="font-bold text-blue-600">
                {{ profil.heuresEnseigneesTotal ||0}}
              </span>
              <span class="text-gray-400 ml-1">Heures Enseignées</span>
            </div>

            <!-- Années d'expérience -->
            <div>
              <span class="font-bold text-green-600">
                {{ profil.anneesExperience }}
              </span>
              <span class="text-gray-400 ml-1">Ans expérience</span>
            </div>

          </div>

          <!-- Compétences -->
          <div class="flex flex-wrap gap-1 mt-2"
               *ngIf="(profil?.competenceNoms?.length ?? 0) > 0">

            <span *ngFor="let c of profil.competenceNoms"
              class="text-sm px-2 py-0.5 rounded-full bg-blue-100 text-blue-600 font-medium">
              {{ c }}
            </span>

          </div>

        </div>
      </div>

    </div>

    <!-- TABS -->
    <div class="flex gap-2 overflow-x-auto border-t border-gray-100 pt-3">

      <button *ngFor="let tab of tabs"
        (click)="tabChange.emit(tab.id)"
        [ngClass]="{
          'border-b-2 border-blue-500 text-blue-600 font-semibold': activeTab === tab.id,
          'text-gray-500 hover:text-gray-700': activeTab !== tab.id
        }"
        class="px-4 py-2 text-base whitespace-nowrap transition">

        {{ tab.label }}
      </button>

    </div>

  </div>
</div>
