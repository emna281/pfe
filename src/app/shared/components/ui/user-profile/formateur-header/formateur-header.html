<div class="bg-transparent dark:bg-gray-800  dark:border-gray-700 py-6">
  <div class="max-w-screen-xl mx-auto px-6">
  <!-- TOP BAR -->
  <div class="flex items-center justify-between mb-6">
    <div>

      <!-- Badge rôle + spécialité -->
      <div class="flex items-center gap-2 mb-1">
        <span class="text-xs font-semibold uppercase tracking-wider
                     bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300
                     px-2 py-0.5 rounded">
          Formateur Senior
        </span>
        <span class="text-gray-300 dark:text-gray-600">›</span>
        <span class="text-sm text-gray-500 dark:text-gray-400">
          {{ profil.specialite || '—' }}
        </span>
      </div>

      <!-- Titre -->
      <h1 class="text-4xl font-bold text-gray-900 dark:text-white leading-tight">
        Bonjour,  {{ profil.nom }}
      </h1>
      <p class="text-sm text-gray-400 mt-1">
        Voici vos sessions à animer pour la semaine.
      </p>

    </div>

    <!-- Boutons d'action -->
    <div class="flex items-center gap-3">
     

    </div>
  </div>

  <!-- STATS CARDS -->
  <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">

    <!-- Sessions actives -->
    <div class="bg-gray-50 dark:bg-gray-700/50 border border-gray-300 rounded-xl p-4">
      <div class="flex items-center gap-2 text-gray-400 text-sm mb-2">
        <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center">
        <lucide-icon [img]="book" class="text-blue-600"></lucide-icon>
        </div>
        Sessions actives
      </div>
      <p class="text-3xl font-bold text-gray-900 dark:text-white">
        {{ nombreSessions }}
      </p>
      <p class="text-xs text-gray-400 mt-1">Ce mois</p>
    </div>

    <!-- Apprenants -->
    <div class="bg-gray-50 dark:bg-gray-700/50 border border-gray-300 rounded-xl p-4">
      <div class="flex items-center gap-2 text-gray-400 text-sm mb-2">
        <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center">
        <lucide-icon [img]="user" class="text-blue-600"></lucide-icon>
        </div>
        Apprenants
      </div>
      <p class="text-3xl font-bold text-gray-900 dark:text-white">
        {{ profil.nombreApprenants || 0 }}
      </p>
      <p class="text-xs text-gray-400 mt-1">Total suivi</p>
    </div>

    <!-- Séances à venir -->
    <div class="bg-gray-50 dark:bg-gray-700/50 border border-gray-300 rounded-xl p-4">
      <div class="flex items-center gap-2 text-gray-400 text-sm mb-2">
        <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center">
        <lucide-icon [img]="calendar" class="text-blue-600"></lucide-icon>
        </div>
        Séances à venir
      </div>
      <p class="text-3xl font-bold text-gray-900 dark:text-white">
        {{ profil.seancesAVenir || 0 }}
      </p>
      <p class="text-xs text-gray-400 mt-1">7 jours</p>
    </div>

    

  </div>

  <!-- TABS -->
  <div class="flex gap-1 border-t border-gray-100 dark:border-gray-700 pt-1">
    <button *ngFor="let tab of tabs"
      (click)="tabChange.emit(tab.id)"
      [ngClass]="{
        'border-b-2 border-blue-500 text-blue-600 font-semibold': activeTab === tab.id,
        'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300': activeTab !== tab.id
      }"
      class="px-4 py-2 text-sm whitespace-nowrap transition">
      {{ tab.label }}
    </button>
  </div>
</div>
</div>
