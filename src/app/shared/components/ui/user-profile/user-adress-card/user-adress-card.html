<div class="rounded-3xl border border-gray-200 bg-white p-6 shadow-sm dark:border-gray-800 dark:bg-white/[0.03]">

  <!-- HEADER -->
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
        <div class="flex items-center justify-center w-10 h-10 rounded-full bg-blue-100">
          <lucide-icon name="briefcase" class="w-5 h-5 text-blue-700"></lucide-icon>
        </div>
        <h4 class="text-xl font-semibold text-gray-800 dark:text-white ">
        Informations Professionnelles
        </h4>
      </div>

    <button *ngIf="!editMode && isAdminView"
      (click)="startEdit()"
      class="flex items-center gap-1.5 text-sm font-medium px-3 py-1.5 rounded-lg
             border border-gray-300 text-gray-200
             bg-gradient-to-br from-[#1a1a2e] via-[#16213e] to-[#0f3460]
             transition-all duration-300
             hover:bg-gradient-to-br hover:from-[#0f3460] hover:via-[#16213e] hover:to-[#1a1a2e]"
    >
    <lucide-icon name="pencil" class="w-4 h-4"></lucide-icon>
    Modifier
    </button>

    <div *ngIf="editMode" class="flex gap-2">
      <button (click)="cancelEdit()"
        class="text-xs px-3 py-1.5 rounded-lg"
        style="border:0.5px solid #d1d5db; color:#6b7280; background:transparent">
        Annuler
      </button>
      <button (click)="saveEdit()" [disabled]="saving"
        class="text-xs px-3 py-1.5 rounded-lg text-white font-medium"
        style="background:#378ADD; border:none"
        [style.opacity]="saving ? '0.7' : '1'">
        {{ saving ? 'Enregistrement...' : 'Enregistrer' }}
      </button>
    </div>
  </div>

  <!-- Succès -->
  <div *ngIf="success"
    class="flex items-center gap-2 text-xs px-3 py-2 rounded-lg mb-4"
    style="background:#EAF3DE; color:#3B6D11">
    <i class="ti ti-circle-check" style="font-size:14px"></i>
    Informations mises à jour avec succès.
  </div>

  <!-- ═══ Mode lecture ═══ -->
  <div *ngIf="!editMode" class="grid grid-cols-1 sm:grid-cols-2 gap-5">

    <!-- FORMATEUR / PLANIFICATEUR / MANAGER / FINANCIER -->
    <ng-container *ngIf="hasProFields">

      <div *ngIf="specialite" class="p-4 rounded-xl bg-gray-50 dark:bg-gray-800/50">
        <p class="text-xs text-gray-500 mb-1">Spécialité</p>
        <p class="font-semibold text-gray-800 dark:text-white">
          {{ specialite }}
        </p>
      </div>

      <div *ngIf="anneesExperience !== null" class="p-4 rounded-xl bg-gray-50 dark:bg-gray-800/50">
        <p class="text-xs text-gray-500 mb-1">Expérience</p>
        <p class="font-semibold text-gray-800 dark:text-white">
          {{ anneesExperience }} ans
        </p>
      </div>


    </ng-container>

    <!-- APPRENANT -->
    <ng-container *ngIf="isApprenant">

      <div *ngIf="posteActuel" class="p-4 rounded-xl bg-gray-50 dark:bg-gray-800/50">
        <p class="text-xs text-gray-500 mb-1">Poste actuel</p>
        <p class="font-semibold text-gray-800 dark:text-white">
          {{ posteActuel }}
        </p>
      </div>

      <div *ngIf="niveauEtude" class="p-4 rounded-xl bg-gray-50 dark:bg-gray-800/50">
        <p class="text-xs text-gray-500 mb-1">Niveau d'étude</p>
        <p class="font-semibold text-gray-800 dark:text-white">
          {{ niveauEtude }}
        </p>
      </div>

    </ng-container>

  </div>

  <!-- ═══ Mode édition ═══ -->
  <div *ngIf="editMode" class="grid grid-cols-1 sm:grid-cols-2 gap-4">

    <ng-container *ngIf="hasProFields">
      <div>
        <label class="text-xs font-medium text-gray-500 block mb-1">Spécialité</label>
        <input type="text" [(ngModel)]="form.specialite"
          class="w-full text-sm rounded-lg px-3 py-2 border border-gray-200
                 focus:outline-none focus:ring-2 focus:ring-blue-300
                 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
      </div>
      <div>
        <label class="text-xs font-medium text-gray-500 block mb-1">Années d'expérience</label>
        <input type="number" min="0" [(ngModel)]="form.anneesExperience"
          class="w-full text-sm rounded-lg px-3 py-2 border border-gray-200
                 focus:outline-none focus:ring-2 focus:ring-blue-300
                 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
      </div>
    </ng-container>

    <ng-container *ngIf="isApprenant">
      <div>
        <label class="text-xs font-medium text-gray-500 block mb-1">Poste Actuel</label>
        <input type="text" [(ngModel)]="form.posteActuel"
          class="w-full text-sm rounded-lg px-3 py-2 border border-gray-200
                 focus:outline-none focus:ring-2 focus:ring-blue-300
                 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
      </div>
      <div>
        <label class="text-xs font-medium text-gray-500 block mb-1">Niveau d'étude</label>
        <input type="text" [(ngModel)]="form.niveauEtude"
          class="w-full text-sm rounded-lg px-3 py-2 border border-gray-200
                 focus:outline-none focus:ring-2 focus:ring-blue-300
                 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
      </div>
    </ng-container>

  </div>

</div>
