<!-- Only render if open -->
@if (isOpen) {
<div class="fixed inset-0 flex items-center justify-center overflow-y-auto modal z-99999 p-4">

  <!-- Backdrop avec blur -->
  @if (!isFullscreen) {
  <div
    class="fixed inset-0 bg-gray-900/50 dark:bg-black/60 backdrop-blur-sm"
    (click)="onBackdropClick($event)">
  </div>
  }

  <!-- Modal container -->
  <div
    [ngClass]="isFullscreen
      ? 'w-full h-full rounded-none'
      : 'relative w-full rounded-2xl bg-white dark:bg-[#161b27] shadow-2xl shadow-gray-900/20 dark:shadow-black/40 border border-gray-100 dark:border-white/[0.07]'"
    [class]="className"
    (click)="onContentClick($event)">

    <!-- Close button -->
    @if (showCloseButton) {
    <button
      (click)="close.emit()"
      class="absolute right-4 top-4 z-999
             flex h-8 w-8 items-center justify-center
             rounded-lg
             text-gray-400 dark:text-[#8b9ab8]
             bg-gray-100 dark:bg-white/[0.06]
             hover:bg-gray-200 dark:hover:bg-white/[0.10]
             hover:text-gray-700 dark:hover:text-[#e2e8f0]
             transition-all duration-150
             sm:right-5 sm:top-5">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path fill-rule="evenodd" clip-rule="evenodd"
          d="M6.04289 16.5413C5.65237 16.9318 5.65237 17.565 6.04289 17.9555C6.43342 18.346 7.06658 18.346 7.45711 17.9555L11.9987 13.4139L16.5408 17.956C16.9313 18.3466 17.5645 18.3466 17.955 17.956C18.3455 17.5655 18.3455 16.9323 17.955 16.5418L13.4129 11.9997L17.955 7.4576C18.3455 7.06707 18.3455 6.43391 17.955 6.04338C17.5645 5.65286 16.9313 5.65286 16.5408 6.04338L11.9987 10.5855L7.45711 6.0439C7.06658 5.65338 6.43342 5.65338 6.04289 6.0439C5.65237 6.43442 5.65237 7.06759 6.04289 7.45811L10.5845 11.9997L6.04289 16.5413Z"
          fill="currentColor"/>
      </svg>
    </button>
    }

    <!-- Content slot -->
    <div>
      <ng-content></ng-content>
    </div>

  </div>
</div>
}
