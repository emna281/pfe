<app-modal
    [isOpen]="isOpen"
    (close)="closeModal()"
    className="max-w-[700px] w-full max-h-[90vh] overflow-hidden p-4 lg:p-6 rounded-2xl 
    bg-gradient-to-b from-[#f5faff] to-white
    shadow-[0_10px_40px_rgba(0,0,0,0.01)]  shadow-blue-100/40"
  >
    <div class=" px-2 overflow-y-auto custom-scrollbar">
      <div class="flex items-center gap-4 sticky top-0  z-10 pb-3 bg-transparent">
        <h5 class="mb-2 font-semibold text-gray-800 modal-title text-theme-xl dark:text-white/90 lg:text-3xl  pt-4">
          {{ selectedCompetence  ? 'Modifier une competence' : 'Ajouter une competence' }}
        </h5>
        
      </div>
       <div class="col-span-1 md:col-span-2 my-2 h-px w-full bg-gray-200"></div>
      <form #competenceForm="ngForm" class="mt-8" >
        <div >
        <div>
          <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">
            Nom de competence
          </label>
          <input
            id="competence-nom"
            type="text"
            name="nom"
            placeholder="Entrer le nom de competence"
            [(ngModel)]="competenceData.nom"
            class="dark:bg-dark-900 h-9 w-full rounded-lg my-2 pt-2 border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800"
          />
        </div>
        <div>
          <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">
            Description de Competence
          </label>
          <textarea
          id="competence-description"
          name="description"
          placeholder="Entrer la description "
          [(ngModel)]="competenceData.description"
          rows="2"
          class="dark:bg-dark-900 w-full my-2 rounded-lg border border-gray-300 px-4 py-2.5 text-sm"
          ></textarea>
        </div>   
        <div>
          <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">
            Categorie
          </label>
          <select
            id="competence-categorie"
            name="categorie"
            [(ngModel)]="competenceData.categorie"
            class="dark:bg-dark-900 h-10 w-full rounded-lg border border-gray-300 px-4 text-sm"
          >
          <option value="" disabled>-- choisir une catégorie --</option>
          <option value="TECHNIQUE">TECHNIQUE</option>
          <option value="DESIGN">Design</option>
          <option value="MARKETING">Marketing</option>
          <option value="MANAGEMENT">Management</option>
          </select>
        </div> 
         <div class="col-span-1 md:col-span-2 my-10 h-px w-full bg-gray-200"></div>
        <div class="flex items-center gap-3 mt-6 modal-footer sm:justify-end">
            <button
          (click)="closeModal()"
          type="button"
          class="flex w-full justify-center rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-400 sm:w-auto"
        >
          Close
            </button>
            <button
          (click)="handleAddOrUpdateEvent()"
          type="button"
          class="btn btn-success btn-update-event flex w-full justify-center rounded-lg bg-brand-500 px-4 py-2.5 text-sm font-medium text-white hover:bg-brand-600 sm:w-auto"
          
          >
          {{ selectedCompetence  ? 'Modifier une competence' : 'Ajouter une competence' }}
            </button>
        </div>
        </div>
      </form>
    </div>
  </app-modal>
