<app-modal [isOpen]="isOpen" (close)="closeModal()" className="max-w-[680px] w-full">
  <!-- ═══════════════════════════════════════ -->
  <!-- WRAPPER PRINCIPAL -->
  <!-- ═══════════════════════════════════════ -->
  <div class="flex flex-col max-h-[90vh] overflow-hidden">

    <!-- ───────── HEADER ───────── -->
    <div class="flex items-start justify-between px-6 pt-6 pb-4
             border-b border-gray-100 dark:border-white/[0.07]
             flex-shrink-0">
      <div class="flex items-center gap-3">

        <!-- Icon -->
        <div class="flex items-center justify-center w-10 h-10 rounded-[10px]
                 bg-[#e8f0fe] dark:bg-[#4285f4]/15 flex-shrink-0">
          <lucide-icon [name]="selectedCompetence ? 'square-pen' : 'plus'" class="w-5 h-5 text-[#4285f4]">
          </lucide-icon>
        </div>

        <!-- Title -->
        <div>
          <h2 class="text-[15px] font-semibold text-gray-900 dark:text-[#e2e8f0]">
            {{ selectedCompetence
            ? 'Modifier une compétence'
            : 'Ajouter une compétence' }}
          </h2>

          <p class="text-[12px] text-gray-400 dark:text-[#8b9ab8] mt-0.5">
            Remplissez les informations du formulaire
          </p>
        </div>

      </div>
    </div>

    <!-- ───────── BODY ───────── -->
    <div class="flex-1 overflow-y-auto px-6 py-5 custom-scrollbar">

      <form #sessionForm="ngForm">

        <div class="flex flex-col gap-5">

          <!-- NOM -->
          <div class="flex flex-col gap-1.5">

            <label class="text-[12px] font-medium text-gray-600 dark:text-[#8b9ab8]">
              Nom de la compétence
            </label>

            <div class="relative">

              <lucide-icon name="badge-info" class="absolute left-3 top-1/2 -translate-y-1/2
                       w-4 h-4 text-gray-400 dark:text-[#4a5568]">
              </lucide-icon>

              <input type="text" name="nom" [(ngModel)]="competenceData.nom"
                placeholder="Entrer le nom de la compétence" class="w-full h-10 pl-11 pr-3 rounded-[9px] text-[13px]
                       bg-gray-50 dark:bg-white/[0.04]
                       border border-gray-200 dark:border-white/[0.09]
                       text-gray-900 dark:text-[#e2e8f0]
                       placeholder-gray-400 dark:placeholder-[#4a5568]
                       focus:outline-none focus:ring-2
                       focus:ring-[#4285f4]/25
                       focus:border-[#4285f4]
                       transition-all duration-150" />

            </div>
          </div>

          <!-- DESCRIPTION -->
          <div class="flex flex-col gap-1.5">

            <label class="text-[12px] font-medium text-gray-600 dark:text-[#8b9ab8]">
              Description de la compétence
            </label>

            <textarea id="competence-description" name="description" rows="3" [(ngModel)]="competenceData.description"
              placeholder="Entrer la description" class="w-full rounded-[9px] border border-gray-200
                     dark:border-white/[0.09]
                     bg-gray-50 dark:bg-white/[0.04]
                     px-4 py-3 text-[13px]
                     text-gray-900 dark:text-[#e2e8f0]
                     placeholder-gray-400 dark:placeholder-[#4a5568]
                     focus:outline-none focus:ring-2
                     focus:ring-[#4285f4]/25
                     focus:border-[#4285f4]
                     transition-all duration-150 resize-none">
            </textarea>

          </div>

          <!-- CATEGORIE -->
          <div class="flex flex-col gap-1.5">

            <label class="text-[12px] font-medium text-gray-600 dark:text-[#8b9ab8]">
              Catégorie
            </label>

            <select id="competence-categorie" name="categorie" [(ngModel)]="competenceData.categorie" class="w-full h-10 rounded-[9px]
                     border border-gray-200 dark:border-white/[0.09]
                     bg-gray-50 dark:bg-white/[0.04]
                     px-3 text-[13px]
                     text-gray-900 dark:text-[#e2e8f0]
                     focus:outline-none focus:ring-2
                     focus:ring-[#4285f4]/25
                     focus:border-[#4285f4]
                     transition-all duration-150">
              <option value="" disabled>
                -- Choisir une catégorie --
              </option>

              <option value="TECHNIQUE">Technique</option>
              <option value="DESIGN">Design</option>
              <option value="MARKETING">Marketing</option>
              <option value="MANAGEMENT">Management</option>
            </select>

          </div>

        </div>

      </form>

    </div>

    <!-- ───────── FOOTER ───────── -->
    <div class="flex items-center justify-end gap-2.5 px-6 py-4
             border-t border-gray-100 dark:border-white/[0.07]
             flex-shrink-0">

      <!-- Cancel -->
      <button type="button" (click)="closeModal()" class="px-4 py-2 rounded-[9px] text-[13px] font-medium
               text-gray-600 dark:text-[#8b9ab8]
               bg-gray-100 dark:bg-white/[0.06]
               hover:bg-gray-200 dark:hover:bg-white/[0.10]
               transition-all duration-150">
        Annuler
      </button>

      <!-- Submit -->
      <button type="button" (click)="handleAddOrUpdateEvent()" class="px-4 py-2 rounded-[9px] text-[13px] font-medium
               text-white bg-[#4285f4] hover:bg-[#2563c9]
               transition-all duration-150 flex items-center gap-2">

        <lucide-icon [name]="selectedCompetence ? 'save' : 'plus'" class="w-3.5 h-3.5">
        </lucide-icon>

        {{
        selectedCompetence
        ? 'Modifier la compétence'
        : 'Ajouter la compétence'
        }}

      </button>

    </div>

  </div>
</app-modal>
