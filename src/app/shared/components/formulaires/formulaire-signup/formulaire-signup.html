
 <div class="flex flex-col items-center">   

    <div *ngIf="showLogo" class="flex flex-col  ">
      <img src="/images/logo/logo.jpg" class="h-16" />
      <span class="text-sm font-bold">FIRSTCODE</span>
    </div>
  <div class="w-full max-w-2xl p-8 bg-white rounded-2xl shadow-xl dark:bg-gray-900">
<div class="mb-6">
  <a routerLink="/"
     class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium
            text-gray-600 bg-gray-100 rounded-lg shadow-sm
            hover:bg-gray-200 dark:bg-gray-800 dark:text-gray-300">

    <svg xmlns="http://www.w3.org/2000/svg" class="size-5" viewBox="0 0 20 20" fill="none">
      <path d="M12.7083 5L7.5 10.2083L12.7083 15.4167"
            stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"></path>
    </svg>

    Retour
  </a>
</div>

<div class="flex flex-col justify-center flex-1 w-full max-w-md mx-auto">
  <div>

    <div class="mb-5 sm:mb-8">
      <h1 class="mb-2 font-semibold text-gray-800 text-title-2xl dark:text-white/90 sm:text-title-md">
        Inscription
      </h1>
      <p class="text-base text-gray-500 dark:text-gray-400">
        Entrez votre email et votre mot de passe pour créer un compte !
      </p>
    </div>

    <!-- Boutons OAuth -->
    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 sm:gap-5">

      <button class="...">
        Sign up with Google
      </button>

      <button class="...">
        Sign up with X
      </button>

    </div>

    <!-- Divider -->
    <div class="relative py-3 sm:py-5">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-gray-200 dark:border-gray-800"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="p-2 text-gray-400 bg-white dark:bg-gray-900 sm:px-5 sm:py-2">
          ou
        </span>
      </div>
    </div>

    <form (ngSubmit)="onSignIn()">
      <div class="space-y-6">

        <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">

          <!-- Prénom -->
          <div>
            <app-label class="text-base font-medium">
              Prénom <span class="text-error-500">*</span>
            </app-label>
            <input type="text" [value]="prenom" id="prenom" name="prenom" [(ngModel)]="prenom" 
              placeholder="Entrez votre prénom"
              class="w-full px-5 py-3 border border-gray-300 rounded-xl text-base
                     focus:outline-none focus:ring-2 focus:ring-brand-500
                     dark:bg-gray-900 dark:border-gray-700 dark:text-white" />
          </div>

          <!-- Nom -->
          <div>
            <app-label class="text-base font-medium">
              Nom <span class="text-error-500">*</span>
            </app-label>
            <input type="text" [value]="nom" id="lname" name="nom" [(ngModel)]="nom"
              placeholder="Entrez votre nom" class="w-full px-5 py-3 border border-gray-300 rounded-lg text-base
                     focus:outline-none focus:ring-2 focus:ring-brand-500
                     dark:bg-gray-900 dark:border-gray-700 dark:text-white" />
          </div>

        </div>

        <!-- Téléphone -->
        <div>
          <app-label class="text-base font-medium">
            Téléphone <span class="text-error-500">*</span>
          </app-label>
          <input type="tel" [value]="telephone" id="telephone" name="telephone" [(ngModel)]="telephone"
            placeholder="Entrez votre téléphone" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm
                     focus:outline-none focus:ring-2 focus:ring-brand-500
                     dark:bg-gray-900 dark:border-gray-700 dark:text-white" />
        </div>

        <!-- Email -->
        <div>
          <app-label class="text-base font-medium">
            Email <span class="text-error-500">*</span>
          </app-label>
          <input type="email" [value]="email" id="email" name="email" [(ngModel)]="email"
            placeholder="Entrez votre email" class="w-full px-5 py-3 border border-gray-300 rounded-lg text-base
                     focus:outline-none focus:ring-2 focus:ring-brand-500
                     dark:bg-gray-900 dark:border-gray-700 dark:text-white" />
        </div>

        <!-- Mot de passe -->
        <div>
          <app-label class="text-base font-medium">
            Mot de passe <span class="text-error-500">*</span>
          </app-label>

          <div class="relative">
            <input
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Entrez votre mot de passe"
              [value]="motDePasse"
              name="motDePasse"
              [(ngModel)]="motDePasse"
              class="w-full px-5 py-3 border border-gray-300 rounded-lg text-base
                     focus:outline-none focus:ring-2 focus:ring-brand-500
                     dark:bg-gray-900 dark:border-gray-700 dark:text-white"
              required />
          </div>
        </div>

        <!-- Checkbox -->
        <div class="flex items-center gap-3">
          <app-checkbox className="w-6 h-6" [(checked)]="isChecked"  />
          <p class="text-base text-gray-500 dark:text-gray-400">
            En créant un compte, vous acceptez les
            <span class="text-gray-800 dark:text-white/90">conditions générales</span>
            et notre
            <span class="text-gray-800 dark:text-white">politique de confidentialité</span>.
          </p>
        </div>

        <!-- Button -->
        <div>
          <button
  type="submit"
  [disabled]="loading"
  class="flex items-center justify-center w-full px-6 py-3 text-base
         font-semibold text-white rounded-xl shadow-md
         bg-brand-500 hover:bg-brand-600
         disabled:opacity-50">

  <svg *ngIf="loading" class="w-5 h-5 animate-spin mr-2"
       xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10"
            stroke="currentColor" stroke-width="4"/>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
  </svg>

  {{ loading ? 'Création...' : "S'inscrire" }}
</button>
        </div>

      </div>
    </form>

    <div class="mt-5">
      <p class="text-base text-center text-gray-700 dark:text-gray-400">
        Vous avez déjà un compte ?
        <a routerLink="/login" class="text-brand-500 hover:text-brand-600">
          Se connecter
        </a>
      </p>
    </div>

  </div>
</div>
</div>
</div>
