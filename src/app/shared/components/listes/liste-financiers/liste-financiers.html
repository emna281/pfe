<app-user-list-header
  [config]="config"
  [totalCount]="totalCount"
  (addClicked)="ouvrirFormulaire()"
  (filterChanged)="onFilterChanged($event)">
</app-user-list-header>

@if (!afficherListe && totalCount > 5 && !loading) {
  <div class="flex flex-col items-center justify-center py-16 gap-4 text-center">
    <span class="text-5xl">🔍</span>
    <h3 class="text-lg font-semibold text-gray-700">{{ totalCount }} financiers trouvés</h3>
    <p class="text-sm text-gray-400 max-w-sm">
      La liste est trop grande pour être affichée. Utilisez la barre de recherche pour trouver un financier.
    </p>
  </div>
}
<app-user-list-page
      [class.hidden]="!afficherListe && totalCount > 5"
      [config]="config"
      [users]="financiers"
      [loading]="loading"
      [totalCount]="totalCount"
      [getExtraFields]="getExtraFields"
      (userClicked)="voirDetail($event)"
      (addClicked)="ouvrirFormulaire()"
>
    </app-user-list-page>
    <app-formulaire-utilisateur
  [isOpen]="isModalOpen"
  [selectedUtilisateur]="selectedUtilisateur"
  [roleFixe]="'FINANCIER'"
  (closeFormulaire)="onFormulaireClose()">
</app-formulaire-utilisateur>
