<app-user-list-page
      [config]="config"
      [users]="financiers"
      [loading]="loading"
      [totalCount]="totalCount"
      [getExtraFields]="getExtraFields"
      (userClicked)="voirDetail($event)"
      (addClicked)="ouvrirFormulaire()"
      (filterChanged)="onFilterChanged($event)">
    </app-user-list-page>
    <app-formulaire-utilisateur
  [isOpen]="isModalOpen"
  [selectedUtilisateur]="selectedUtilisateur"
  [roleFixe]="'FINANCIER'"
  (closeFormulaire)="onFormulaireClose()">
</app-formulaire-utilisateur>
