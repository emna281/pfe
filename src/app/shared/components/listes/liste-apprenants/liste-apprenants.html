
<div class="toolbar-impression">
  <button
    class="btn-imprimer-tout"
    (click)="ouvrirImpression()"
    [disabled]="!apprenants?.length">
    🖨️ Imprimer les attestations
    <span class="badge" *ngIf="apprenants?.length">{{ apprenants!.length }}</span>
  </button>
</div>
<app-user-list-page
      [config]="config"
      [users]="apprenants"
      [loading]="loading"
      [totalCount]="totalCount"
      [getExtraFields]="getExtraFields"
      (userClicked)="voirDetail($event)"
      (addClicked)="ouvrirFormulaire()"
      (filterChanged)="onFilterChanged($event)">
    </app-user-list-page>
<app-formulaire-inscr-apprenant
  [isOpen]="isModalOpen"
  [sessionId]="selectedSessionId"
  [apprenantEmail]="selectedApprenantEmail"
  (closeFormulaire)="isModalOpen = false"
  (inscriptionCreee)="onInscriptionCreee($event)">
</app-formulaire-inscr-apprenant>
<!-- ── Dialogue d'impression de toutes les attestations ── -->

  <app-certificat-dialog
    *ngIf="dialogImprimerOuvert && apprenants?.length"
    [apprenants]="apprenants!"
    (closed)="fermerImpression()">
  </app-certificat-dialog>
