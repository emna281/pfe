<app-modal [isOpen]="isOpen" (close)="closeModal()" className="max-w-[680px] w-full">
  <div class="flex flex-col max-h-[90vh] overflow-hidden">

    <!-- ───────── HEADER ───────── -->
    <div class="flex items-start justify-between px-6 pt-6 pb-4
             border-b border-gray-100 dark:border-white/[0.07] flex-shrink-0">
      <div class="flex items-center gap-3">
        <div class="flex items-center justify-center w-10 h-10 rounded-[10px]
                 bg-[#e8f0fe] dark:bg-[#4285f4]/15 flex-shrink-0">
          <lucide-icon [name]="selectedFormation ? 'square-pen' : 'plus'" class="w-5 h-5 text-[#4285f4]">
          </lucide-icon>
        </div>
        <div>
          <h2 class="text-[15px] font-semibold text-gray-900 dark:text-[#e2e8f0]">
            {{ selectedFormation ? 'Modifier une formation' : 'Ajouter une formation' }}
          </h2>
          <p class="text-[12px] text-gray-400 dark:text-[#8b9ab8] mt-0.5">
            Remplissez les informations du formulaire
          </p>
        </div>
      </div>
    </div>

    <!-- ───────── ONGLETS ───────── -->
    <div class="flex border-b border-gray-100 dark:border-white/[0.07]
             px-6 bg-white dark:bg-transparent flex-shrink-0">

      <button type="button" *ngFor="let tab of tabs"
        (click)="activeTab = tab.id"
        class="flex items-center gap-1.5 px-3.5 py-2.5 text-[12px] font-medium
               border-b-2 -mb-px transition-all duration-150 whitespace-nowrap"
        [ngClass]="activeTab === tab.id
          ? 'border-[#4285f4] text-[#4285f4]'
          : 'border-transparent text-gray-400 dark:text-[#8b9ab8] hover:text-[#4285f4]'">
        <lucide-icon [name]="tab.icon" class="w-3.5 h-3.5"></lucide-icon>
        {{ tab.label }}
      </button>

    </div>

    <!-- ───────── BODY ───────── -->
    <div class="flex-1 overflow-y-auto px-6 py-5 custom-scrollbar">
      <form #formationForm="ngForm" novalidate>

        <!-- ══ Onglet 1 : Informations générales ══ -->
        <div *ngIf="activeTab === 'general'" class="flex flex-col gap-5">

          <div class="flex flex-col gap-1.5">
            <label class="text-[12px] font-medium text-gray-600 dark:text-[#8b9ab8]">Titre</label>
            <div class="relative">
              <lucide-icon name="graduation-cap" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 dark:text-[#4a5568]"></lucide-icon>
              <input type="text" name="titre" [(ngModel)]="formationData.titre"
                required #titre="ngModel"
                placeholder="Entrer le titre de la formation"
                class="w-full h-10 pl-11 pr-3 rounded-[9px] text-[13px]
                       bg-gray-50 dark:bg-white/[0.04]
                       border border-gray-200 dark:border-white/[0.09]
                       text-gray-900 dark:text-[#e2e8f0]
                       placeholder-gray-400 dark:placeholder-[#4a5568]
                       focus:outline-none focus:ring-2 focus:ring-[#4285f4]/25
                       focus:border-[#4285f4] transition-all duration-150" />
            </div>
            <p *ngIf="titre.invalid && titre.touched" class="text-[11px] text-red-500">Le titre est obligatoire</p>
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-[12px] font-medium text-gray-600 dark:text-[#8b9ab8]">Prix public</label>
            <div class="relative">
              <lucide-icon name="circle-dollar-sign" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 dark:text-[#4a5568]"></lucide-icon>
              <input type="text" name="prixPublic" [(ngModel)]="formationData.prixPublic"
                required #prix="ngModel"
                placeholder="Ex: 1200"
                class="w-full h-10 pl-11 pr-3 rounded-[9px] text-[13px]
                       bg-gray-50 dark:bg-white/[0.04]
                       border border-gray-200 dark:border-white/[0.09]
                       text-gray-900 dark:text-[#e2e8f0]
                       placeholder-gray-400 dark:placeholder-[#4a5568]
                       focus:outline-none focus:ring-2 focus:ring-[#4285f4]/25
                       focus:border-[#4285f4] transition-all duration-150" />
            </div>
            <p *ngIf="prix.invalid && prix.touched" class="text-[11px] text-red-500">Champ obligatoire</p>
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-[12px] font-medium text-gray-600 dark:text-[#8b9ab8]">Description</label>
            <textarea name="description" [(ngModel)]="formationData.description"
              rows="4" placeholder="Décrire la formation..."
              class="w-full rounded-[9px] border border-gray-200 dark:border-white/[0.09]
                     bg-gray-50 dark:bg-white/[0.04]
                     px-4 py-3 text-[13px] text-gray-900 dark:text-[#e2e8f0]
                     placeholder-gray-400 dark:placeholder-[#4a5568]
                     focus:outline-none focus:ring-2 focus:ring-[#4285f4]/25
                     focus:border-[#4285f4] transition-all duration-150 resize-none">
            </textarea>
          </div>

        </div>

        <!-- ══ Onglet 2 : Durée ══ -->
        <div *ngIf="activeTab === 'duree'" class="flex flex-col gap-5">

          <div class="grid grid-cols-2 gap-4">

            <div class="flex flex-col gap-1.5">
              <label class="text-[12px] font-medium text-gray-600 dark:text-[#8b9ab8]">Durée en jours</label>
              <div class="relative">
                <lucide-icon name="calendar-days" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 dark:text-[#4a5568]"></lucide-icon>
                <input type="number" name="dureeJours" [(ngModel)]="formationData.dureeJours"
                  placeholder="Ex: 5"
                  class="w-full h-10 pl-11 pr-3 rounded-[9px] text-[13px]
                         bg-gray-50 dark:bg-white/[0.04]
                         border border-gray-200 dark:border-white/[0.09]
                         text-gray-900 dark:text-[#e2e8f0]
                         placeholder-gray-400 dark:placeholder-[#4a5568]
                         focus:outline-none focus:ring-2 focus:ring-[#4285f4]/25
                         focus:border-[#4285f4] transition-all duration-150" />
              </div>
            </div>

            <div class="flex flex-col gap-1.5">
              <label class="text-[12px] font-medium text-gray-600 dark:text-[#8b9ab8]">Durée en heures</label>
              <div class="relative">
                <lucide-icon name="clock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 dark:text-[#4a5568]"></lucide-icon>
                <input type="number" name="dureeHeures" [(ngModel)]="formationData.dureeHeures"
                  placeholder="Ex: 35"
                  class="w-full h-10 pl-11 pr-3 rounded-[9px] text-[13px]
                         bg-gray-50 dark:bg-white/[0.04]
                         border border-gray-200 dark:border-white/[0.09]
                         text-gray-900 dark:text-[#e2e8f0]
                         placeholder-gray-400 dark:placeholder-[#4a5568]
                         focus:outline-none focus:ring-2 focus:ring-[#4285f4]/25
                         focus:border-[#4285f4] transition-all duration-150" />
              </div>
            </div>

          </div>

        </div>

        <!-- ══ Onglet 3 : Détails pédagogiques ══ -->
        <div *ngIf="activeTab === 'pedagogie'" class="flex flex-col gap-5">

          <div class="flex flex-col gap-1.5">
            <label class="text-[12px] font-medium text-gray-600 dark:text-[#8b9ab8]">Public cible</label>
            <div class="relative">
              <lucide-icon name="users" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 dark:text-[#4a5568]"></lucide-icon>
              <input type="text" name="publicCible" [(ngModel)]="formationData.publicCible"
                placeholder="Ex: Développeurs débutants"
                class="w-full h-10 pl-11 pr-3 rounded-[9px] text-[13px]
                       bg-gray-50 dark:bg-white/[0.04]
                       border border-gray-200 dark:border-white/[0.09]
                       text-gray-900 dark:text-[#e2e8f0]
                       placeholder-gray-400 dark:placeholder-[#4a5568]
                       focus:outline-none focus:ring-2 focus:ring-[#4285f4]/25
                       focus:border-[#4285f4] transition-all duration-150" />
            </div>
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-[12px] font-medium text-gray-600 dark:text-[#8b9ab8]">Prérequis</label>
            <div class="relative">
              <lucide-icon name="list-checks" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 dark:text-[#4a5568]"></lucide-icon>
              <input type="text" name="prerequis" [(ngModel)]="formationData.prerequis"
                placeholder="Ex: Bases en programmation"
                class="w-full h-10 pl-11 pr-3 rounded-[9px] text-[13px]
                       bg-gray-50 dark:bg-white/[0.04]
                       border border-gray-200 dark:border-white/[0.09]
                       text-gray-900 dark:text-[#e2e8f0]
                       placeholder-gray-400 dark:placeholder-[#4a5568]
                       focus:outline-none focus:ring-2 focus:ring-[#4285f4]/25
                       focus:border-[#4285f4] transition-all duration-150" />
            </div>
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-[12px] font-medium text-gray-600 dark:text-[#8b9ab8]">Programme</label>
            <textarea name="programme" [(ngModel)]="formationData.programme"
              rows="4" placeholder="Ex: Bases en JavaScript..."
              class="w-full rounded-[9px] border border-gray-200 dark:border-white/[0.09]
                     bg-gray-50 dark:bg-white/[0.04]
                     px-4 py-3 text-[13px] text-gray-900 dark:text-[#e2e8f0]
                     placeholder-gray-400 dark:placeholder-[#4a5568]
                     focus:outline-none focus:ring-2 focus:ring-[#4285f4]/25
                     focus:border-[#4285f4] transition-all duration-150 resize-none">
            </textarea>
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-[12px] font-medium text-gray-600 dark:text-[#8b9ab8]">Version</label>
            <div class="relative">
              <lucide-icon name="tag" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 dark:text-[#4a5568]"></lucide-icon>
              <input type="text" name="version" [(ngModel)]="formationData.version"
                placeholder="Ex: v1.0"
                class="w-full h-10 pl-11 pr-3 rounded-[9px] text-[13px]
                       bg-gray-50 dark:bg-white/[0.04]
                       border border-gray-200 dark:border-white/[0.09]
                       text-gray-900 dark:text-[#e2e8f0]
                       placeholder-gray-400 dark:placeholder-[#4a5568]
                       focus:outline-none focus:ring-2 focus:ring-[#4285f4]/25
                       focus:border-[#4285f4] transition-all duration-150" />
            </div>
          </div>

          <!-- Remplacer le <select multiple> par ceci -->
<div class="flex flex-col gap-1.5">
  <label class="text-[12px] font-medium text-gray-600 dark:text-[#8b9ab8]">
    Compétences associées
  </label>
  
  <div class="flex flex-col gap-1 max-h-[150px] overflow-y-auto rounded-[9px]
              border border-gray-200 dark:border-white/[0.09]
              bg-gray-50 dark:bg-white/[0.04] px-2 py-2">
    <label *ngFor="let comp of competences"
      class="flex items-center gap-2.5 px-2 py-1.5 rounded-[7px] cursor-pointer
             hover:bg-[#4285f4]/08 transition-colors"
      [ngClass]="selectedCompetenceNoms.includes(comp.nom) 
        ? 'bg-[#e8f0fe] dark:bg-[#4285f4]/15' : ''">
      <input type="checkbox"
        [checked]="selectedCompetenceNoms.includes(comp.nom)"
        (change)="toggleCompetence(comp.nom)"
        class="accent-[#4285f4] w-3.5 h-3.5" />
      <span class="text-[13px] text-gray-900 dark:text-[#e2e8f0]">{{ comp.nom }}</span>
      <span class="text-[11px] text-gray-400 dark:text-[#4a5568] ml-auto">{{ comp.categorie }}</span>
    </label>
    
    <p *ngIf="competences.length === 0"
      class="text-[12px] text-gray-400 dark:text-[#4a5568] text-center py-2">
      Aucune compétence disponible
    </p>
  </div>

  <!-- Badges sélectionnés -->
  <div class="flex flex-wrap gap-1.5" *ngIf="selectedCompetenceNoms.length > 0">
    <span *ngFor="let nom of selectedCompetenceNoms"
      class="flex items-center gap-1 px-2.5 py-1 rounded-full text-[11px] font-medium
             bg-[#e8f0fe] dark:bg-[#4285f4]/15
             text-[#185FA5] dark:text-[#4285f4]
             border border-[#4285f4]/20">
      {{ nom }}
      <button type="button" (click)="toggleCompetence(nom)"
        class="hover:text-red-500 transition-colors leading-none">✕</button>
    </span>
  </div>
</div>

        </div>

        <!-- ══ Onglet 4 : Statut ══ -->
        <div *ngIf="activeTab === 'statut'" class="flex flex-col gap-5">

          <div class="flex items-center gap-3">
            <app-switch
              name="actif"
              [defaultChecked]="formationData.actif"
              color="blue"
              (valueChange)="formationData.actif = $event">
            </app-switch>
            <span class="text-[13px] font-medium text-gray-700 dark:text-[#e2e8f0]">
              {{ formationData.actif ? 'Active' : 'Inactive' }}
            </span>
          </div>

        </div>

      </form>
    </div>

    <!-- ───────── FOOTER ───────── -->
    <div class="flex items-center justify-end gap-2.5 px-6 py-4
             border-t border-gray-100 dark:border-white/[0.07] flex-shrink-0">
      <button type="button" (click)="closeModal()"
        class="px-4 py-2 rounded-[9px] text-[13px] font-medium
               text-gray-600 dark:text-[#8b9ab8]
               bg-gray-100 dark:bg-white/[0.06]
               hover:bg-gray-200 dark:hover:bg-white/[0.10]
               transition-all duration-150">
        Annuler
      </button>
      <button type="button" (click)="handleAddOrUpdateEvent()"
        [disabled]="formationForm.invalid || isLoading"
        class="px-4 py-2 rounded-[9px] text-[13px] font-medium
               text-white bg-[#4285f4] hover:bg-[#2563c9]
               disabled:opacity-50 disabled:cursor-not-allowed
               transition-all duration-150 flex items-center gap-2">
        <lucide-icon [name]="selectedFormation ? 'save' : 'plus'" class="w-3.5 h-3.5"></lucide-icon>
        {{ isLoading ? 'Chargement...' : (selectedFormation ? 'Modifier la formation' : 'Ajouter la formation') }}
      </button>
    </div>

  </div>
</app-modal>
