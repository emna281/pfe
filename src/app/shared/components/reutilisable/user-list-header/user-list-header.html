<!-- user-list-header.html -->
<div class="mb-6">

  <!-- Ligne titre + boutons -->
  <div class="flex items-center justify-between mb-4 flex-wrap gap-4">

    <!-- Titre + compteur -->
    <div class="flex items-baseline gap-2">
      <span class="text-3xl font-bold text-orange-500">{{ totalCount }}</span>
      <h1 class="text-3xl font-bold text-gray-900">{{ config.title }}</h1>
    </div>

    <!-- Boutons -->
    <div class="flex items-center gap-3">
      <button class="flex items-center gap-2 px-4 py-2 bg-white border border-gray-200
                     rounded-xl text-sm text-gray-600 font-medium hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
        </svg>
        Filtrer
      </button>

      <button
        class="flex items-center gap-2 px-5 py-2 bg-orange-500 hover:bg-orange-600
               text-white rounded-xl text-sm font-semibold transition-all
               hover:shadow-md hover:shadow-orange-200 hover:-translate-y-0.5"
        (click)="onAddClick()">
        + {{ config.addLabel }}
      </button>
    </div>
  </div>

  <!-- Barre de recherche -->
  <div class="relative">
    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
         viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="11" cy="11" r="7"/>
      <path d="M16.5 16.5l4 4" stroke-linecap="round"/>
    </svg>

    <input
      type="text"
      [placeholder]="config.filterPlaceholder || config.filterLabel"
      [value]="searchValue"
      (input)="onSearchInput($event)"
      class="w-full pl-10 pr-10 py-2.5 bg-white border border-gray-200 rounded-xl
             text-sm text-gray-700 placeholder-gray-400 focus:outline-none
             focus:ring-2 focus:ring-orange-300 focus:border-orange-400 transition-all"
    />

    <button
      *ngIf="searchValue"
      (click)="clearSearch()"
      class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-300
             hover:text-gray-500 transition-colors">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

</div>
