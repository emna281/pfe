<nav class="px-4 py-2 flex items-center justify-between bg-transparent gap-4 w-full z-10 relative">

  <!-- Logo -->
  <a href="#" class="flex items-center gap-4 ml-0 lg:ml-4 flex-shrink-0">
    <img src="/images/logo/logo4.jpg" class="h-10 w-10 rounded-3xl object-cover border border-slate-200 shadow-sm" />
    <div class="flex flex-col">
      <span class="text-lg font-bold tracking-[0.24em] uppercase text-slate-900">FIRSTCODE</span>
      <span class="text-xs uppercase tracking-[0.2em] text-slate-500">Campus & formations</span>
    </div>
  </a>

  <!-- ✅ Nav Links (déplacés ici, entre logo et search) -->
  <div class="hidden md:flex items-center gap-1 flex-shrink-0">
    <ul class="flex flex-row items-center gap-1">
      @for (link of links; track link.key) {
        <li class="relative group">
          @if (!link.children) {
            <a [href]="link.href || '#'"
               class="nav-link block rounded-xl py-2 px-3 text-slate-700 text-base hover:text-sky-600 transition-colors duration-200"
               [class.active]="activeLink === link.key"
               (click)="setActive(link.key)">
              {{ link.label }}
            </a>
          }
          @if (link.children) {
            <button class="nav-link flex items-center gap-1 rounded-xl py-2 px-3 text-slate-700 text-base hover:text-sky-600 transition-colors duration-200"
                    [class.active]="activeLink === link.key"
                    (click)="setActive(link.key)">
              {{ link.label }}
              <svg class="w-4 h-4 transition-transform duration-200 group-hover:rotate-180"
                   fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 9-7 7-7-7"/>
              </svg>
            </button>
            <div class="absolute top-full left-0 mt-2 w-48 bg-white border border-gray-100
                        rounded-xl shadow-lg opacity-0 invisible
                        group-hover:opacity-100 group-hover:visible
                        transition-all duration-200 z-50">
              <ul class="py-2">
                @for (child of link.children; track child.label) {
                  <li>
                    <a [href]="child.href || '#'"
                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-[#517FB0] transition-colors duration-150">
                      {{ child.label }}
                    </a>
                  </li>
                }
              </ul>
            </div>
          }
        </li>
      }
    </ul>
  </div>

  <!-- ✅ Search bar agrandie (flex-1 + max-w-xl) -->
  <div class="flex-1 max-w-xl" [class.hidden]="!showSearch">
    <div class="relative">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"
           fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
      </svg>
      <input
        type="text"
        [(ngModel)]="searchQuery"
        (keyup.enter)="onSearch()"
        placeholder="Rechercher une formation…"
        class="w-full pl-10 pr-4 py-2.5 text-sm border border-gray-200 rounded-xl
               bg-gray-50 text-gray-800 placeholder-gray-400
               focus:outline-none focus:ring-2 focus:ring-[#517FB0]/30
               focus:border-[#517FB0] transition-all duration-200"
      />
      <button (click)="searchQuery = ''; onSearch()"
              [class.hidden]="!searchQuery"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </div>

  @if (showLoginButton) {
  <div class="flex-shrink-0">
    <button type="button" routerLink="/signin"
            class="inline-flex items-center justify-center rounded-full bg-gradient-to-r from-sky-600 to-indigo-600 px-6 py-3 text-base font-semibold text-white shadow-lg shadow-sky-200/40 transition duration-200 hover:from-sky-700 hover:to-indigo-700 focus:outline-none focus:ring-4 focus:ring-sky-200/60">
      Connexion
    </button>
  </div>
}
</nav>
