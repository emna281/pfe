<!-- Modal Overlay -->
<div
  *ngIf="visible"
  class="modal-overlay"
  (click)="annuler.emit()"
  role="presentation"
  aria-hidden="true">

  <!-- Modal Content -->
  <div
    class="modal-content"
    (click)="$event.stopPropagation()"
    role="dialog"
    aria-modal="true"
    [attr.aria-labelledby]="'modal-title'"
    [attr.aria-describedby]="'modal-message'">

    <!-- Icon Section -->
    <div class="modal-icon" aria-hidden="true">
      {{ getIconByType(type) }}
    </div>

    <!-- Content Section -->
    <div class="modal-body">
      <!-- Title -->
      <h3 id="modal-title" class="modal-title">
        {{ titre }}
      </h3>

      <!-- Message -->
      <p id="modal-message" class="modal-message">
        {{ message }}
      </p>
    </div>

    <!-- Actions Section -->
    <div class="modal-actions">
      <button
        type="button"
        class="btn btn-cancel"
        (click)="annuler.emit()"
        [attr.aria-label]="labelAnnuler">
        {{ labelAnnuler }}
      </button>

      <button
        type="button"
        class="btn btn-confirm"
        [ngClass]="getButtonClass(type)"
        (click)="confirmer.emit()"
        [attr.aria-label]="labelConfirmer">
        {{ labelConfirmer }}
      </button>
    </div>

  </div>
</div>
